# Find full documentation here https://docs.github.com/en/actions/learn-github-actions/workflow-syntax-for-github-actions
name: CI

on:
  pull_request:

  # Manual invocation.
  workflow_dispatch:

  push:
    branches:
      - main
jobs:
  CI:
    runs-on: ubuntu-latest

    # See https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
    permissions:
      id-token: write
      contents: read
      pull-requests: write # required by guardian/actions-riff-raff
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: 'sbt'

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.tool-versions'
          cache: 'npm'
          cache-dependency-path: 'cdk/package-lock.json'

      # This step creates an environment variable `BUILD_NUMBER`.
      # It is used by:
      #   - The `script/ci` script
      #   - The CDK infrastructure
      #   - The `guardian/actions-riff-raff` GitHub Action
      - run: |
          LAST_TEAMCITY_BUILD=1265
          echo "BUILD_NUMBER=$(( $GITHUB_RUN_NUMBER + $LAST_TEAMCITY_BUILD ))" >> $GITHUB_ENV

      - name: Run script/ci
        run: ./script/ci

      - uses: guardian/actions-riff-raff@ab360a150e2540439f7f675c37d170a2fd6c8604 # v4.3.4
        with:
          projectName: security-hq
          roleArn: ${{ secrets.GU_RIFF_RAFF_ROLE_ARN }}
          buildNumber: ${{ env.BUILD_NUMBER }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          configPath: cdk/cdk.out/riff-raff.yaml

          contentDirectories: |
            cdk.out:
              - cdk/cdk.out/security-hq.template.json
            security-hq:
              - dist/security-hq-${{ env.BUILD_NUMBER }}.deb
            iam-outdated-credentials:
              - dist/iam-outdated-credentials-${{ env.BUILD_NUMBER }}.jar
            iam-unrecognised-users:
              - dist/iam-unrecognised-users-${{ env.BUILD_NUMBER }}.jar
          # No point in links to a Code stage, as there isn't one
          commentingEnabled: false
