allowedStages:
  - PROD
stacks:
  - security
regions:
  - eu-west-1
deployments:
  security-hq:
    type: autoscaling
    actions:
      - uploadArtifacts
  security-hq-cfn:
    type: cloud-formation
    app: security-hq
    parameters:
      prependStackToCloudFormationStackName: false
      cloudFormationStackName: security-hq
      templatePath: security-hq.template.json
      amiParameter: AMISecurityhq
      amiEncrypted: true
      amiTags:
        Recipe: arm64-jammy-java21-security
        BuiltBy: amigo
        AmigoStage: PROD
    dependencies:
      - security-hq
  vulnerability-metrics:
    type: aws-lambda
    parameters:
      bucketSsmLookup: true
      fileName: vulnerability-metrics.jar
      prefixStack: false
      lookupByTags: true
  vulnerability-metrics-cfn:
    type: cloud-formation
    app: vulnerability-metrics
    parameters:
      prependStackToCloudFormationStackName: false
      cloudFormationStackName: vulnerability-metrics
      templatePath: vulnerability-metrics.template.json
    dependencies:
      - vulnerability-metrics
